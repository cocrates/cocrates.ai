name: Build OpenCode Plugin

on:
  push:
    branches:
      - main
    paths:
      - 'opencode/**'
      - '.github/workflows/opencode-plugin.yml'
  pull_request:
    paths:
      - 'opencode/**'
      - '.github/workflows/opencode-plugin.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: opencode

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opencode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cocrates-opencode-dist
          path: opencode/dist/
          retention-days: 7

  release:
    if: startsWith(github.ref, 'refs/tags/opencode-v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opencode/package-lock.json

      - name: Install dependencies
        working-directory: opencode
        run: npm ci

      - name: Build
        working-directory: opencode
        run: npm run build

      - name: Create release archive
        working-directory: opencode
        run: tar -czf ../cocrates-opencode-${{ github.ref_name }}.tar.gz dist package.json README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cocrates-opencode-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
